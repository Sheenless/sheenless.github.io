---
layout: default
---

<article class="dataviz-item">
  {% if page.image %}
    <img src="{{ page.image }}" alt="{{ page.title }}">
  {% endif %}
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}
    <p class="post-subtitle">{{ page.subtitle }}</p>
  {% endif %}
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
   {% if page.tags %}
      <div class="post-tags">
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  {{ content }}
</article>
